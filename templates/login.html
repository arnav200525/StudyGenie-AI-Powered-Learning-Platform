<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudyGenie – Login</title>
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}"> -->
  <!-- <link rel="stylesheet" href="../static/login.css"> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* ───────────────────────────────────────────
       DESIGN TOKENS (matches About page)
    ─────────────────────────────────────────── */
    :root {
      --bg:             #f8f9fc;
      --bg-white:       #ffffff;
      --bg-elevated:    #f1f4fb;
      --border:         #e4e8f0;
      --border-strong:  #d0d7e6;
      --border-focus:   #3b6ef0;

      --primary:        #3b6ef0;
      --primary-light:  #eef2fd;
      --primary-hover:  #2d5ce8;
      --accent:         #7c5cfc;

      --green:          #10b981;
      --green-light:    #ecfdf5;
      --red:            #ef4444;
      --red-light:      #fef2f2;

      --text-1:         #111827;
      --text-2:         #4b5768;
      --text-3:         #9aa5b4;

      --radius-sm:      8px;
      --radius-md:      12px;
      --radius-lg:      16px;
      --radius-xl:      24px;

      --shadow-sm:      0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:      0 4px 16px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-card:    0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-primary: 0 8px 32px rgba(59,110,240,0.22);

      --font-display:   'Sora', sans-serif;
      --font-body:      'DM Sans', sans-serif;
      --transition:     0.2s cubic-bezier(0.4,0,0.2,1);
    }

    /* ───────────────────────────────────────────
       RESET
    ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Subtle dot-grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,110,240,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,110,240,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(59,110,240,0.07) 0%, transparent 65%);
      top: -100px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    a { text-decoration: none; color: inherit; }

    /* ───────────────────────────────────────────
       HEADER
    ─────────────────────────────────────────── */
    .site-header {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text-1);
      transition: opacity var(--transition);
    }
    .brand:hover { opacity: 0.75; }

    .logo-wrap {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #3b6ef0 0%, #7c5cfc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 4px 12px rgba(59,110,240,0.28);
    }

    .header-link {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-2);
      transition: color var(--transition);
    }
    .header-link:hover { color: var(--primary); }

    /* ───────────────────────────────────────────
       PAGE LAYOUT
    ─────────────────────────────────────────── */
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      z-index: 1;
    }

    /* ───────────────────────────────────────────
       LOGIN CARD
    ─────────────────────────────────────────── */
    .login-box {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    /* Gradient top bar */
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b6ef0, #7c5cfc, #ec4899);
    }

    /* Card header */
    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #3b6ef0 0%, #7c5cfc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(59,110,240,0.25);
    }

    .card-header h2 {
      font-family: var(--font-display);
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -0.025em;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.9rem;
      color: var(--text-3);
    }

    /* ───────────────────────────────────────────
       FORM
    ─────────────────────────────────────────── */
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-group label {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.01em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      color: var(--text-3);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color var(--transition);
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-1);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      outline: none;
      transition: all var(--transition);
    }

    .input-wrap input::placeholder { color: var(--text-3); }

    .input-wrap input:hover {
      border-color: var(--border-strong);
      background: var(--bg-white);
    }

    .input-wrap input:focus {
      border-color: var(--border-focus);
      background: var(--bg-white);
      box-shadow: 0 0 0 3px rgba(59,110,240,0.1);
    }

    .input-wrap input:focus + i,
    .input-wrap:focus-within i {
      color: var(--primary);
    }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 0.88rem;
      padding: 0;
      transition: color var(--transition);
    }
    .toggle-pw:hover { color: var(--primary); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.97rem;
      font-weight: 700;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: var(--shadow-primary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-submit:hover {
      background: var(--primary-hover);
      box-shadow: 0 10px 36px rgba(59,110,240,0.32);
      transform: translateY(-2px);
    }
    .btn-submit:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.78rem;
      color: var(--text-3);
      font-weight: 500;
      white-space: nowrap;
    }

    /* Register link */
    .register-row {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-2);
    }
    .register-row a {
      color: var(--primary);
      font-weight: 600;
      transition: opacity var(--transition);
    }
    .register-row a:hover { opacity: 0.75; }

    /* ───────────────────────────────────────────
       TOAST NOTIFICATION (replaces alert)
    ─────────────────────────────────────────── */
    .toast {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--red-light);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease both;
    }

    .toast-icon {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .toast-icon i { font-size: 0.6rem; color: var(--red); }

    .toast-text {
      font-size: 0.88rem;
      color: #b91c1c;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ───────────────────────────────────────────
       FOOTER
    ─────────────────────────────────────────── */
    .site-footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      background: var(--bg-white);
      padding: 24px;
      text-align: center;
    }
    .site-footer p {
      font-size: 0.8rem;
      color: var(--text-3);
    }
    .site-footer a {
      color: var(--primary);
      transition: opacity var(--transition);
    }
    .site-footer a:hover { opacity: 0.75; }

    /* ───────────────────────────────────────────
       ANIMATIONS
    ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ───────────────────────────────────────────
       RESPONSIVE
    ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .login-box { padding: 36px 24px; border-radius: var(--radius-lg); }
      .page-body { padding: 32px 16px; align-items: flex-start; padding-top: 40px; }
    }
  </style>
</head>

<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">
        <div class="logo-wrap">🧠</div>
        <span>StudyGenie</span>
      </a>
      <a class="header-link" href="/register">
        Don't have an account? <strong style="color:var(--primary);">Sign up</strong>
      </a>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <div class="page-body">
    <div class="login-box">

      <!-- Card icon + title -->
      <div class="card-header">
        <div class="card-icon">🧠</div>
        <h2>Welcome back</h2>
        <p>Sign in to continue your study journey</p>
      </div>

      <!-- Flash message (replaces alert) -->
      

      <!-- Login form — action/method/names unchanged -->
      <form action="/login" method="post">

        <div class="field-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" name="username" placeholder="Enter your username" required />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
            
            </button>
          </div>
        </div>
        {% if message %}
      <div class="toast">
        <span class="toast-icon"><i class="fa-solid fa-exclamation"></i></span>
        <span class="toast-text">{{ message }}</span>
      </div>
      {% endif %}

        <button type="submit" class="btn-submit">
          Sign In <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="divider"><span>or</span></div>

        <p class="register-row">
          New member? <a href="/register">Create an account</a>
        </p>

      </form>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <p>© <span id="year"></span> StudyGenie. All rights reserved. &nbsp;·&nbsp;
      <a href="mailto:hello@studygenie.app">hello@studygenie.app</a>
    </p>
  </footer>


</body>

</html>
