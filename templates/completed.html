<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Completed</title>
  <link rel="stylesheet" href=" {{ url_for('static', filename='com.css') }} ">
</head>
<body>
  <div class="msg">
    <h1>🎉Congratulations </h1>
    <p>You have successfully compeleted this level</p>
    <p>✅ Correct: {{ correct }} / {{ total }}</p>
    <p>❌ Wrong: {{ wrong }}</p>
    <p>📊 Accuracy: {{ accuracy }}%</p>
    <a href="/reset">Play Again</a>
  </div>
</body>
<script>
const correctSound = new Audio('{{ url_for("static", filename="sounds/correct.mp3") }}');
const wrongSound = new Audio('{{ url_for("static", filename="sounds/wrong.mp3") }}');

// Shake animation for wrong answer
function shakeMessage() {
    const msg = document.querySelector('.msg');
    msg.classList.add('shake');
    wrongSound.play();
    setTimeout(() => msg.classList.remove('shake'), 500);
}

// Confetti for correct answer
function triggerConfetti() {
    correctSound.play();
    for (let i=0;i<100;i++){
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random()*100+'vw';
        c.style.background = `hsl(${Math.random()*360},70%,50%)`;
        c.style.animationDuration = (2+Math.random()*3)+'s';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),5000);
    }
}
</script>
</html>
